<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <title>Sales Prediction Web App</title>
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: medium;
        }
        legend {
            font-size: xx-large;
        }
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5">
        
        <form action="/predict" method="POST">
          <fieldset class="p-3">
            
            <legend class="text-center text-uppercase">Sales Prediction Web App</legend>

            <div class="flex-container row m-auto justify-content-center">
              <label for="quantity" class="col-md-4 col-sm-12 m-2 p-1">Quantity</label>
              <label for="discount" class="col-md-4 col-sm-12 m-2 p-1">Discount</label>
            </div>
            <div class="flex-container row m-auto justify-content-center">
              <input type="number" min="0" class="col-md-4 col-sm-12 m-2 p-1 form-control" name="quantity" id="quantity" required placeholder="Quantity">
              <input type="number" min="0" step="0.01" class="col-md-4 col-sm-12 m-2 p-1 form-control" name="discount" id="discount" required placeholder="Discount">
            </div>

            <div class="flex-container row m-auto justify-content-center">
              <label for="profit" class="col-md-4 col-sm-12 m-2 p-1">Profit</label>
              <label for="shipping_cost" class="col-md-4 col-sm-12 m-2 p-1">Shipping Cost</label>
            </div>
            <div class="flex-container row m-auto justify-content-center">
              <input type="number" step="0.01" class="col-md-4 col-sm-12 m-2 p-1 form-control" name="profit" id="profit" required placeholder="Profit">
              <input type="number" step="0.01" class="col-md-4 col-sm-12 m-2 p-1 form-control" name="shipping_cost" id="shipping_cost" required placeholder="Shipping Cost">
            </div>

            <!-- New input fields for categorical features -->
            <div class="flex-container row m-auto justify-content-center">
              <label for="productCategory" class="col-md-4 col-sm-12 m-2 p-1">Product Category</label>
              <label for="product" class="col-md-4 col-sm-12 m-2 p-1">Product</label>
            </div>
            <div class="flex-container row m-auto justify-content-center">
              <select name="productCategory" class="col-md-4 col-sm-12 m-2 p-1 form-control" required>
                {% for category_value, category_label in product_category_mapping.items() %}
                  <option value="{{ category_value }}">{{ category_label }}</option>
                {% endfor %}
              </select>
              <select name="product" class="col-md-4 col-sm-12 m-2 p-1 form-control" required>
                {% for product_value, product_label in product_mapping.items() %}
                  <option value="{{ product_value }}">{{ product_label }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="flex-container row justify-content-center m-4">
              <button type="submit" class="btn btn-primary">Predict</button>
            </div>
          </fieldset>
        </form>

        {% if prediction_text %}
        <div class="flex-container row m-auto justify-content-center">
            <div class="alert alert-dismissible fade show mt-3 alert-success" role="alert">
                {{ prediction_text }}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
        </div>
        {% endif %}

    </div>
    
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</body>
</html>
